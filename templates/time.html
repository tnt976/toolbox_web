{% extends "base.html" %}

{% block title %}时间工具 - Developer Toolbox{% endblock %}

{% block content %}
<section class="tools-section">
    <div class="container">
        <div class="tool-header">
            <h1>⏰ 时间工具</h1>
            <a href="/" class="back-link">← 返回工具箱</a>
        </div>

        <div class="tool-content">
            <div class="tool-card">
                <h2>当前时间</h2>
                <button id="getCurrentTime" class="btn">获取当前时间</button>
                <div id="currentTimeResult" class="result-box hidden">
                    <div class="result-item">
                        <label>当前时间戳:</label>
                        <span id="currentTimestamp"></span>
                    </div>
                    <div class="result-item">
                        <label>格式化时间:</label>
                        <span id="currentDatetime"></span>
                    </div>
                </div>
            </div>

            <div class="tool-card">
                <h2>时间戳 → 日期时间</h2>
                <form id="timestampForm" class="tool-form">
                    <div class="form-group">
                        <label for="timestampInput">输入时间戳（秒）:</label>
                        <input type="number" id="timestampInput" placeholder="例如: 1704067200" required>
                    </div>
                    <button type="submit" class="btn">转换</button>
                </form>
                <div id="timestampResult" class="result-box hidden">
                    <div class="result-item">
                        <label>转换结果:</label>
                        <span id="timestampOutput"></span>
                    </div>
                </div>
            </div>

            <div class="tool-card">
                <h2>日期时间 → 时间戳</h2>
                <form id="datetimeForm" class="tool-form">
                    <div class="form-group">
                        <label for="datetimeInput">输入日期时间:</label>
                        <input type="datetime-local" id="datetimeInput" required>
                    </div>
                    <button type="submit" class="btn">转换</button>
                </form>
                <div id="datetimeResult" class="result-box hidden">
                    <div class="result-item">
                        <label>转换结果:</label>
                        <span id="datetimeOutput"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
