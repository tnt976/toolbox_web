{% extends "base.html" %}

{% block title %}AES加密/解密 - Developer Toolbox{% endblock %}

{% block content %}
<section class="tools-section">
    <div class="container">
        <div class="tool-header">
            <h1>🔐 AES加密/解密</h1>
            <a href="/" class="back-link">← 返回工具箱</a>
        </div>

        <div class="tool-content">
            <div class="tool-card">
                <div class="aes-options">
                    <div class="option-group">
                        <label for="aesMode">运算模式：</label>
                        <select id="aesMode">
                            <option value="ECB" selected>ECB (电子密码本)</option>
                            <option value="CBC">CBC (密码分组链接)</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <label for="aesPadding">填充模式：</label>
                        <select id="aesPadding">
                            <option value="PKCS7" selected>PKCS7</option>
                            <option value="ZeroPadding">ZeroPadding</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <label for="aesKeySize">密钥长度：</label>
                        <select id="aesKeySize">
                            <option value="128" selected>128 bits</option>
                            <option value="192">192 bits</option>
                            <option value="256">256 bits</option>
                        </select>
                    </div>
                </div>

                <div class="aes-key-section">
                    <label for="aesKeyType">密钥：</label>
                    <select id="aesKeyType">
                        <option value="Text" selected>Text</option>
                        <option value="Hex">Hex</option>
                    </select>
                    <input type="text" id="aesKey" value="ImGMJUPZQBpcx3Wf" placeholder="输入密钥">
                </div>

                <div class="aes-input-section">
                    <label for="aesInput">输入：</label>
                    <textarea id="aesInput" rows="8" placeholder='{"LimitTime":"2027/01/01 00:00:00","Data":"","Features":[{"FeatureId":1,"Name":"基础功能","Data":"{\"Key\":\"EquipmentNum\",\"Val\":\"66\"}"},{"FeatureId":3,"Name":"温度云图","Data":""},{"FeatureId":4,"Name":"机器人监控","Data":""},{"FeatureId":5,"Name":"暖通运行状态管理","Data":""},{"FeatureId":6,"Name":"蓄电池管理","Data":""},{"FeatureId":7,"Name":"视频管理","Data":""},{"FeatureId":8,"Name":"电话语音通知","Data":""},{"FeatureId":9,"Name":"语言盒短信通知","Data":""},{"FeatureId":10,"Name":"告警箱通知","Data":""},{"FeatureId":11,"Name":"容量管理","Data":""},{"FeatureId":12,"Name":"配电管理","Data":""},{"FeatureId":13,"Name":"能耗管理","Data":""},{"FeatureId":14,"Name":"预警管理","Data":""},{"FeatureId":15,"Name":"机架管理","Data":""},{"FeatureId":16,"Name":"资产管理","Data":""},{"FeatureId":17,"Name":"空调群控","Data":""},{"FeatureId":18,"Name":"控制联动","Data":""}],"LicenseType":1}'></textarea>
                </div>

                <div class="aes-options-bottom">
                    <div class="option-group">
                        <label for="aesEncoding">字符编码：</label>
                        <select id="aesEncoding">
                            <option value="UTF-8" selected>UTF-8</option>
                            <option value="GBK">GBK</option>
                            <option value="GB2312">GB2312</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <label for="aesFormat">格式：</label>
                        <select id="aesFormat">
                            <option value="Base64" selected>Base64</option>
                            <option value="Hex">Hex</option>
                        </select>
                        <span class="format-note">（格式加密表示输出，解密表示输入）</span>
                    </div>
                    <div class="button-group">
                        <button class="btn" onclick="encryptAES()">加密</button>
                        <button class="btn" onclick="decryptAES()">解密</button>
                        <button class="btn" onclick="swapAES()">⇄ 交换</button>
                    </div>
                </div>

                <div class="aes-output-section">
                    <label for="aesOutput">输出：</label>
                    <textarea id="aesOutput" rows="8" readonly placeholder="加密/解密结果将显示在这里"></textarea>
                    <button class="btn-small" onclick="copyResult('aesOutput')">复制</button>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
