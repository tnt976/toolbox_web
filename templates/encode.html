{% extends "base.html" %}

{% block title %}编码转换 - Developer Toolbox{% endblock %}

{% block content %}
<section class="tools-section">
    <div class="container">
        <div class="tool-header">
            <h1>🔤 编码转换工具</h1>
            <a href="/" class="back-link">← 返回工具箱</a>
        </div>

        <div class="tool-tabs">
            <button class="tab-btn active" data-tab="base64">Base64</button>
            <button class="tab-btn" data-tab="url">URL</button>
            <button class="tab-btn" data-tab="html">HTML</button>
        </div>

        <div class="tool-content">
            <div id="base64" class="tab-content active">
                <div class="tool-card">
                    <h2>Base64 编码</h2>
                    <form class="encode-form">
                        <div class="form-group">
                            <label for="base64EncodeInput">输入文本:</label>
                            <textarea id="base64EncodeInput" rows="3" placeholder="输入需要编码的文本"></textarea>
                        </div>
                        <button type="button" class="btn" onclick="encodeBase64()">编码</button>
                    </form>
                    <div id="base64EncodeResult" class="result-box hidden">
                        <label>编码结果:</label>
                        <div class="result-text" id="base64EncodeOutput"></div>
                        <button class="btn-small" onclick="copyResult('base64EncodeOutput')">复制</button>
                    </div>
                </div>

                <div class="tool-card">
                    <h2>Base64 解码</h2>
                    <form class="encode-form">
                        <div class="form-group">
                            <label for="base64DecodeInput">输入Base64:</label>
                            <textarea id="base64DecodeInput" rows="3" placeholder="输入需要解码的Base64字符串"></textarea>
                        </div>
                        <button type="button" class="btn" onclick="decodeBase64()">解码</button>
                    </form>
                    <div id="base64DecodeResult" class="result-box hidden">
                        <label>解码结果:</label>
                        <div class="result-text" id="base64DecodeOutput"></div>
                        <button class="btn-small" onclick="copyResult('base64DecodeOutput')">复制</button>
                    </div>
                </div>
            </div>

            <div id="url" class="tab-content">
                <div class="tool-card">
                    <h2>URL 编码</h2>
                    <form class="encode-form">
                        <div class="form-group">
                            <label for="urlEncodeInput">输入文本:</label>
                            <textarea id="urlEncodeInput" rows="3" placeholder="输入需要URL编码的文本"></textarea>
                        </div>
                        <button type="button" class="btn" onclick="encodeURL()">编码</button>
                    </form>
                    <div id="urlEncodeResult" class="result-box hidden">
                        <label>编码结果:</label>
                        <div class="result-text" id="urlEncodeOutput"></div>
                        <button class="btn-small" onclick="copyResult('urlEncodeOutput')">复制</button>
                    </div>
                </div>

                <div class="tool-card">
                    <h2>URL 解码</h2>
                    <form class="encode-form">
                        <div class="form-group">
                            <label for="urlDecodeInput">输入URL编码:</label>
                            <textarea id="urlDecodeInput" rows="3" placeholder="输入需要解码的URL编码字符串"></textarea>
                        </div>
                        <button type="button" class="btn" onclick="decodeURL()">解码</button>
                    </form>
                    <div id="urlDecodeResult" class="result-box hidden">
                        <label>解码结果:</label>
                        <div class="result-text" id="urlDecodeOutput"></div>
                        <button class="btn-small" onclick="copyResult('urlDecodeOutput')">复制</button>
                    </div>
                </div>
            </div>

            <div id="html" class="tab-content">
                <div class="tool-card">
                    <h2>HTML 实体编码</h2>
                    <form class="encode-form">
                        <div class="form-group">
                            <label for="htmlEncodeInput">输入文本:</label>
                            <textarea id="htmlEncodeInput" rows="3" placeholder="输入需要HTML实体编码的文本"></textarea>
                        </div>
                        <button type="button" class="btn" onclick="encodeHTML()">编码</button>
                    </form>
                    <div id="htmlEncodeResult" class="result-box hidden">
                        <label>编码结果:</label>
                        <div class="result-text" id="htmlEncodeOutput"></div>
                        <button class="btn-small" onclick="copyResult('htmlEncodeOutput')">复制</button>
                    </div>
                </div>

                <div class="tool-card">
                    <h2>HTML 实体解码</h2>
                    <form class="encode-form">
                        <div class="form-group">
                            <label for="htmlDecodeInput">输入HTML实体:</label>
                            <textarea id="htmlDecodeInput" rows="3" placeholder="输入需要解码的HTML实体字符串"></textarea>
                        </div>
                        <button type="button" class="btn" onclick="decodeHTML()">解码</button>
                    </form>
                    <div id="htmlDecodeResult" class="result-box hidden">
                        <label>解码结果:</label>
                        <div class="result-text" id="htmlDecodeOutput"></div>
                        <button class="btn-small" onclick="copyResult('htmlDecodeOutput')">复制</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
