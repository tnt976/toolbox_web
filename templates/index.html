{% extends "base.html" %}

{% block title %}工具箱 - Developer Toolbox{% endblock %}

{% block content %}
<section class="hero">
    <div class="container">
        <h1>🧰 开发者工具箱</h1>
        <p>实用的在线工具集合，帮助开发者快速完成日常任务</p>
    </div>
</section>

<section class="features">
    <div class="container">
        <h2>工具列表</h2>
        <div class="feature-grid">
            <a href="/tools/time" class="feature-card">
                <div class="feature-icon">⏰</div>
                <h3>时间工具</h3>
                <p>时间戳与日期时间相互转换，支持不同时区</p>
            </a>
            <a href="/tools/encode" class="feature-card">
                <div class="feature-icon">🔤</div>
                <h3>编码转换</h3>
                <p>Base64、URL、HTML实体编码与解码</p>
            </a>
            <a href="/tools/url" class="feature-card">
                <div class="feature-icon">🔗</div>
                <h3>URL工具</h3>
                <p>URL编解码、参数解析与构建</p>
            </a>
            <a href="/tools/aes" class="feature-card">
                <div class="feature-icon">🔐</div>
                <h3>AES加密/解密</h3>
                <p>AES对称加密解密工具</p>
            </a>
        </div>
    </div>
</section>
{% endblock %}
