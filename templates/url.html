{% extends "base.html" %}

{% block title %}URL工具 - Developer Toolbox{% endblock %}

{% block content %}
<section class="tools-section">
    <div class="container">
        <div class="tool-header">
            <h1>🔗 URL工具</h1>
            <a href="/" class="back-link">← 返回工具箱</a>
        </div>

        <div class="tool-content">
            <div class="tool-card">
                <h2>URL 解析</h2>
                <form id="urlParseForm">
                    <div class="form-group">
                        <label for="parseUrlInput">输入URL:</label>
                        <input type="url" id="parseUrlInput" placeholder="https://example.com/path?param1=value1&param2=value2" required>
                    </div>
                    <button type="submit" class="btn">解析</button>
                </form>
                <div id="urlParseResult" class="result-box hidden">
                    <div class="result-item">
                        <label>协议 (Scheme):</label>
                        <span id="urlScheme"></span>
                    </div>
                    <div class="result-item">
                        <label>域名 (Domain):</label>
                        <span id="urlDomain"></span>
                    </div>
                    <div class="result-item">
                        <label>路径 (Path):</label>
                        <span id="urlPath"></span>
                    </div>
                    <div class="result-item">
                        <label>参数 (Query):</label>
                        <div id="urlParams"></div>
                    </div>
                </div>
            </div>

            <div class="tool-card">
                <h2>URL 编码/解码</h2>
                <form id="urlEncodeForm">
                    <div class="form-group">
                        <label for="urlEncodeInput">输入URL或文本:</label>
                        <textarea id="urlEncodeInput" rows="3" placeholder="输入需要编码或解码的URL/文本"></textarea>
                    </div>
                    <div class="button-group">
                        <button type="button" class="btn" onclick="encodeFullURL()">编码</button>
                        <button type="button" class="btn" onclick="decodeFullURL()">解码</button>
                    </div>
                </form>
                <div id="urlEncodeResult" class="result-box hidden">
                    <label>结果:</label>
                    <div class="result-text" id="urlEncodeOutput"></div>
                    <button class="btn-small" onclick="copyResult('urlEncodeOutput')">复制</button>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
