<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滢水山庄一区房屋编码查询系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #1a1a2e;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
        }

        .stat-card .label {
            font-size: 12px;
            opacity: 0.9;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
            margin-top: 4px;
        }

        .controls {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .filter-group {
            display: flex;
            gap: 12px;
        }

        .filter-group select {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            background: white;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .table-container {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #333;
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f8f9ff;
        }

        .code-cell {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #667eea;
        }

        .pagination {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 8px;
            align-items: center;
            background: #fafafa;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pagination button:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .pagination button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #e8f4fd;
            color: #1e88e5;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 滢水山庄一区房屋编码查询系统</h1>
            <p>深圳市龙华区 - 官方标准地址编码</p>
            <div class="stats">
                <div class="stat-card">
                    <div class="label">总记录数</div>
                    <div class="value" id="totalRecords">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">楼栋</div>
                    <div class="value" id="totalBuildings">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">当前显示</div>
                    <div class="value" id="currentDisplay">0</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索楼栋、房号、房屋编码...">
            </div>
            <div class="filter-group">
                <select id="buildingFilter">
                    <option value="">全部楼栋</option>
                </select>
                <select id="unitFilter">
                    <option value="">全部单元</option>
                </select>
                <select id="floorFilter">
                    <option value="">全部楼层</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="exportToPDF()">
                📄 导出PDF
            </button>
            <button class="btn btn-secondary" onclick="resetFilters()">
                🔄 重置
            </button>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>楼栋</th>
                        <th>单元</th>
                        <th>楼层</th>
                        <th>房号</th>
                        <th>房屋编码(25位)</th>
                        <th>楼栋编码(19位)</th>
                        <th>详细地址</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="7" class="loading">加载数据中...</td>
                    </tr>
                </tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        const recordsPerPage = 30;

        // 解析CSV数据
        async function loadCSV() {
            try {
                const response = await fetch('./data/滢水山庄一区_标准25位房屋编码表.csv');
                const csvText = await response.text();
                const lines = csvText.split('\n');
                const headers = lines[0].split(',');
                
                allData = [];
                for (let i = 1; i < lines.length; i++) {
                    if (lines[i].trim()) {
                        const values = parseCSVLine(lines[i]);
                        if (values.length >= 7) {
                            allData.push({
                                building: values[0].trim(),
                                unit: values[1].trim(),
                                floor: values[2].trim(),
                                room: values[3].trim(),
                                houseCode: values[4].trim(),
                                buildingCode: values[5].trim(),
                                address: values[6].trim()
                            });
                        }
                    }
                }
                
                filteredData = [...allData];
                initFilters();
                updateStats();
                renderTable();
            } catch (error) {
                console.error('加载数据失败:', error);
                loadMockData();
            }
        }

        // 解析CSV行（处理引号内的逗号）
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        // 加载模拟数据（当CSV加载失败时）
        function loadMockData() {
            allData = [];
            const buildings = ['1栋', '2栋', '3栋', '4栋', '5栋', '6栋', '7栋', '8栋', '9栋'];
            const units = ['1单元', '2单元', '3单元'];
            
            buildings.forEach(building => {
                units.forEach(unit => {
                    for (let floor = 1; floor <= 8; floor++) {
                        for (let room = 1; room <= 2; room++) {
                            const floorStr = floor.toString().padStart(2, '0');
                            const roomNum = floorStr + room.toString().padStart(2, '0');
                            const bNum = building.replace('栋', '').padStart(4, '0');
                            const uNum = unit.replace('单元', '');
                            
                            allData.push({
                                building: building,
                                unit: unit,
                                floor: floor + '楼',
                                room: roomNum,
                                houseCode: `440306009${bNum}${uNum}${floorStr}${room}${bNum}${uNum}${floorStr}${room}001`,
                                buildingCode: `440306009${bNum}${uNum}${floorStr}`,
                                address: `深圳市滢水山庄一区${building}${unit}${floor}楼${roomNum}室`
                            });
                        }
                    }
                });
            });
            
            filteredData = [...allData];
            initFilters();
            updateStats();
            renderTable();
        }

        // 初始化筛选器
        function initFilters() {
            const buildings = [...new Set(allData.map(d => d.building))].sort();
            const units = [...new Set(allData.map(d => d.unit))].sort();
            const floors = [...new Set(allData.map(d => d.floor))].sort();
            
            populateSelect('buildingFilter', buildings);
            populateSelect('unitFilter', units);
            populateSelect('floorFilter', floors);
        }

        function populateSelect(id, options) {
            const select = document.getElementById(id);
            const firstOption = select.options[0];
            select.innerHTML = '';
            select.appendChild(firstOption);
            
            options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt;
                select.appendChild(option);
            });
        }

        // 更新统计数据
        function updateStats() {
            document.getElementById('totalRecords').textContent = allData.length;
            document.getElementById('totalBuildings').textContent = [...new Set(allData.map(d => d.building))].length;
            document.getElementById('currentDisplay').textContent = filteredData.length;
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const start = (currentPage - 1) * recordsPerPage;
            const end = start + recordsPerPage;
            const pageData = filteredData.slice(start, end);
            
            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading">没有找到匹配的数据</td></tr>';
            } else {
                tbody.innerHTML = pageData.map(row => `
                    <tr>
                        <td><span class="badge">${row.building}</span></td>
                        <td>${row.unit}</td>
                        <td>${row.floor}</td>
                        <td><strong>${row.room}</strong></td>
                        <td class="code-cell">${row.houseCode}</td>
                        <td class="code-cell">${row.buildingCode}</td>
                        <td>${row.address}</td>
                    </tr>
                `).join('');
            }
            
            renderPagination();
        }

        // 渲染分页
        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / recordsPerPage);
            const pagination = document.getElementById('pagination');
            
            let html = '';
            html += `<button onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>`;
            html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            
            for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
                html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            
            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
            html += `<button onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>末页</button>`;
            html += `<span style="margin-left:16px;color:#666;">共 ${totalPages} 页</span>`;
            
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderTable();
        }

        // 搜索和筛选
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('buildingFilter').addEventListener('change', applyFilters);
        document.getElementById('unitFilter').addEventListener('change', applyFilters);
        document.getElementById('floorFilter').addEventListener('change', applyFilters);

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const building = document.getElementById('buildingFilter').value;
            const unit = document.getElementById('unitFilter').value;
            const floor = document.getElementById('floorFilter').value;
            
            filteredData = allData.filter(row => {
                let match = true;
                if (search) {
                    match = match && (
                        row.building.toLowerCase().includes(search) ||
                        row.room.toLowerCase().includes(search) ||
                        row.houseCode.includes(search) ||
                        row.address.toLowerCase().includes(search)
                    );
                }
                if (building) match = match && row.building === building;
                if (unit) match = match && row.unit === unit;
                if (floor) match = match && row.floor === floor;
                return match;
            });
            
            currentPage = 1;
            updateStats();
            renderTable();
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('buildingFilter').value = '';
            document.getElementById('unitFilter').value = '';
            document.getElementById('floorFilter').value = '';
            filteredData = [...allData];
            currentPage = 1;
            updateStats();
            renderTable();
        }

        // 导出PDF
        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            
            doc.setFontSize(20);
            doc.text('滢水山庄一区房屋编码表', 14, 20);
            doc.setFontSize(10);
            doc.text('深圳市龙华区 - 官方标准地址编码', 14, 28);
            doc.text(`生成时间: ${new Date().toLocaleString('zh-CN')}`, 14, 34);
            doc.text(`共 ${filteredData.length} 条记录`, 14, 40);
            
            const tableData = filteredData.map(row => [
                row.building,
                row.unit,
                row.floor,
                row.room,
                row.houseCode,
                row.address
            ]);
            
            doc.autoTable({
                head: [['楼栋', '单元', '楼层', '房号', '房屋编码', '详细地址']],
                body: tableData,
                startY: 50,
                theme: 'grid',
                styles: { fontSize: 7 },
                headStyles: { fillColor: [102, 126, 234], textColor: 255 }
            });
            
            doc.save('滢水山庄一区房屋编码表.pdf');
        }

        // 页面加载时初始化
        loadCSV();
    </script>
</body>
</html>
